spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/suits_in_dev
    username: hem
    password:
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

logging:
  level:
    root: INFO
    com.suits: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
